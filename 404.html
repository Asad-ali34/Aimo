<script>
function toggleNav(){
  const nl=document.getElementById('navLinks');
  const open=nl.classList.toggle('open');
  const b1=document.getElementById('nib1'),b2=document.getElementById('nib2'),b3=document.getElementById('nib3');
  if(b1){b1.classList.toggle('open-1',open);b2.classList.toggle('open-2',open);b3.classList.toggle('open-3',open);}
}
(function(){
  let lastY=0,ticking=false;
  const nav=document.querySelector('.nav');
  window.addEventListener('scroll',function(){
    if(!ticking){requestAnimationFrame(function(){
      const y=window.scrollY;
      if(y>80){nav.classList.toggle('nav-hidden',y>lastY&&y>180);nav.classList.add('nav-scrolled');}
      else{nav.classList.remove('nav-hidden','nav-scrolled');}
      lastY=y;ticking=false;
    });ticking=true;}
  });
})();
(function(){
  function addRipple(el){el.classList.add('ripple-host');el.addEventListener('click',function(e){const r=el.getBoundingClientRect(),size=Math.max(r.width,r.height)*1.8;const w=document.createElement('span');w.className='ripple-wave';w.style.cssText='width:'+size+'px;height:'+size+'px;left:'+(e.clientX-r.left-size/2)+'px;top:'+(e.clientY-r.top-size/2)+'px';el.appendChild(w);setTimeout(()=>w.remove(),580);});}
  document.querySelectorAll('.btn,.nav-cta').forEach(addRipple);
})();
(async()=>{try{const r=await fetch('/api/me');const me=await r.json();const w=document.getElementById('nav-auth-wrap');if(!w)return;if(me.loggedIn){w.innerHTML=`<a href="/profile" style="display:flex;align-items:center;gap:7px;text-decoration:none;color:var(--text);font-weight:600;font-size:.82rem"><img src="${me.avatar}" style="width:28px;height:28px;border-radius:50%;border:2px solid #7C3AED" onerror="this.style.display='none'"/> ${me.global_name}</a>`;}else{document.getElementById('nav-login-btn').style.display='';}}catch{}})();
</script>
